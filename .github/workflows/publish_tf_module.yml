# Uses the built-in GITHUB_TOKEN (via the job's `contents: write` permission)
# instead of a PA_TOKEN secret, so this repo needs no secret to auto-tag.
#
# Tradeoff: tags/releases pushed with GITHUB_TOKEN do NOT re-trigger other
# workflows (GitHub suppresses recursive workflow runs from GITHUB_TOKEN
# events). That doesn't matter here — nothing in this repo listens on the
# tag/release event; the Terraform Registry publishes by polling new tags
# directly, not via a GitHub Actions trigger.
name: Auto Tag and Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.5

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Initialize Terraform
        run: terraform init -backend=false

      - name: Validate Terraform
        run: terraform validate

      - name: Set up Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Get the latest tag
        id: get_latest_tag
        run: |
          # Fetch all tags from the remote
          git fetch --tags
          # Get the latest semver tag, defaulting to v0.0.0 if no tags exist
          latest_tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi
          echo "latest_tag=$latest_tag" >> "$GITHUB_ENV"
          echo "Latest tag found: $latest_tag"

      - name: Calculate new version
        id: calculate_version
        run: |
          # Default to v0.0.0 if no tag exists
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi

          # Parse version numbers
          IFS='.' read -r -a parts <<< "${latest_tag#v}"
          major="${parts[0]:-0}"
          minor="${parts[1]:-0}"
          patch="${parts[2]:-0}"

          # Increment patch version
          patch=$((patch + 1))
          new_version="v$major.$minor.$patch"

          # Check if the new version already exists
          if git rev-parse "$new_version" >/dev/null 2>&1; then
            echo "Tag $new_version already exists. Skipping tag creation."
            echo "tag_exists=true" >> "$GITHUB_ENV"
          else
            echo "tag_exists=false" >> "$GITHUB_ENV"
          fi

          echo "new_version=$new_version" >> "$GITHUB_ENV"
          echo "New version is $new_version"

      - name: Create new tag
        if: env.tag_exists == 'false'
        run: |
          git tag "${{ env.new_version }}"
          git push origin "${{ env.new_version }}"

      - name: Create GitHub release
        if: env.tag_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.new_version }}
          name: ${{ env.new_version }}
          draft: false
          prerelease: false
